name: Create Issue Branch

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      dev_branch:
        description: 'Development branch name'
        required: false
        default: 'dev'
        type: string

permissions:
  contents: write
  issues: write

jobs:
  create_branch:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.issue.labels.*.name, 'planned') &&
      (contains(github.event.issue.labels.*.name, 'enhancement') || contains(github.event.issue.labels.*.name, 'bug') || contains(github.event.issue.labels.*.name, 'performance') || contains(github.event.issue.labels.*.name, 'test'))
    steps:
      - name: 'Install GitHub CLI'
        run: |
          if ! command -v gh &> /dev/null; then
            echo "GitHub CLI not found. Installing..."
            (type -p wget >/dev/null || (sudo apt update && sudo apt-get install wget -y)) \
              && sudo mkdir -p -m 755 /etc/apt/keyrings \
              && out=$(mktemp) && wget -nv -O$out https://cli.github.com/packages/githubcli-archive-keyring.gpg \
              && cat $out | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null \
              && sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg \
              && echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
              && sudo apt update \
              && sudo apt install gh -y
          else
            echo "GitHub CLI is already installed."
          fi
      - name: Get Repository Default Branch
        id: default_branch
        run: |
          DEFAULT_BRANCH=$(gh api repos/${{ github.repository }} --jq '.default_branch')
          echo "default_branch=$DEFAULT_BRANCH" >> $GITHUB_OUTPUT
          echo "Default branch: $DEFAULT_BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse Issue
        if: |
          contains(github.event.issue.labels.*.name, 'bug') ||
          contains(github.event.issue.labels.*.name, 'performance')
        uses: stefanbuck/github-issue-parser@v3
        id: issue-parser

      - name: Print Issue Body
        if: |
          contains(github.event.issue.labels.*.name, 'bug') ||
          contains(github.event.issue.labels.*.name, 'performance')
        run: cat ${HOME}/issue-parser-result.json

      - name: Detect version (labels or issue form)
        id: version_detection
        env:
          PARSED: ${{ (contains(github.event.issue.labels.*.name, 'bug') || contains(github.event.issue.labels.*.name, 'performance')) && steps.issue-parser.outputs.issueparser_affected_version || '' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABELS='${{ toJson(github.event.issue.labels.*.name) }}'
          echo "All labels: $LABELS"

          # Prefer an existing N.x label on the issue
          VERSION_LABEL=$(echo "$LABELS" | jq -r '.[] | select(test("^[0-9]+\\.x$"))' | head -n 1)

          # Else use bug/performance form field "Affected version line" parsed from the body
          if [ -z "$VERSION_LABEL" ]; then
            IS_BUG="${{ contains(github.event.issue.labels.*.name, 'bug') }}"
            IS_PERF="${{ contains(github.event.issue.labels.*.name, 'performance') }}"
            if { [ "$IS_BUG" = "true" ] || [ "$IS_PERF" = "true" ]; } && [ -n "$PARSED" ]; then
              if echo "$PARSED" | grep -qE '^[0-9]+\.[xX]$'; then
                VERSION_LABEL=$(echo "$PARSED" | tr '[:upper:]' '[:lower:]')
                echo "Using parsed affected_version from issue form: $VERSION_LABEL"
              fi
            fi
          fi

          if [ -n "$VERSION_LABEL" ]; then
            echo "Resolved version line: $VERSION_LABEL"
            echo "version_label=$VERSION_LABEL" >> $GITHUB_OUTPUT
            echo "has_version=true" >> $GITHUB_OUTPUT
          else
            echo "No version label or form version found"
            echo "version_label=" >> $GITHUB_OUTPUT
            echo "has_version=false" >> $GITHUB_OUTPUT
          fi

      - name: Check Version Branch Existence
        id: version_branch
        if: steps.version_detection.outputs.has_version == 'true'
        run: |
          VERSION_LABEL="${{ steps.version_detection.outputs.version_label }}"
          if gh api "repos/${{ github.repository }}/branches/${VERSION_LABEL}" --silent 2>/dev/null; then
            echo "Branch $VERSION_LABEL exists"
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "branch=$VERSION_LABEL" >> $GITHUB_OUTPUT
          else
            echo "Branch $VERSION_LABEL does NOT exist"
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "branch=" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Issue Details
        id: extract
        run: |
          SEVERITY=""
          if [[ "${{ contains(github.event.issue.labels.*.name, 'bug') }}" == "true" ]]; then
            SEVERITY="${{ steps.issue-parser.outputs.issueparser_severity }}"
          fi
          TITLE="${{ github.event.issue.title }}"
          TITLE=$(echo "$TITLE" | awk -F ']:' '{print $NF}')
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "severity=$SEVERITY" >> $GITHUB_OUTPUT

      - name: Determine Branch Type
        id: prefix
        run: |
          # Use workflow input for dev branch if available, otherwise default to 'dev'
          DEV_BRANCH="${{ inputs.dev_branch || '11.x-dev' }}"

          # Determine source branch based on version label
          if [[ "${{ steps.version_detection.outputs.has_version }}" == "true" ]] && [[ "${{ steps.version_branch.outputs.exists }}" == "true" ]]; then
            # Use the version branch if it exists
            SOURCE="${{ steps.version_branch.outputs.branch }}"
            echo "Using version branch: $SOURCE"
          else
            # Default to dev branch
            SOURCE="$DEV_BRANCH"
            echo "Using dev branch: $SOURCE"
          fi

          if [[ "${{ contains(github.event.issue.labels.*.name, 'enhancement') }}" == "true" ]]; then
            PREFIX="feature/"
          elif [[ "${{ contains(github.event.issue.labels.*.name, 'bug') }}" == "true" ]]; then
            SEVERITY=${{ steps.extract.outputs.severity }}
            if [ "$SEVERITY" == "Critical" ]; then
              PREFIX="hotfix/"
              # For critical bugs, use version branch if available, otherwise default branch
              if [[ "${{ steps.version_detection.outputs.has_version }}" == "true" ]] && [[ "${{ steps.version_branch.outputs.exists }}" == "true" ]]; then
                SOURCE="${{ steps.version_branch.outputs.branch }}"
              else
                SOURCE="${{ steps.default_branch.outputs.default_branch }}"
              fi
            else
              PREFIX="bugfix/"
            fi
          elif [[ "${{ contains(github.event.issue.labels.*.name, 'performance') }}" == "true" ]]; then
            PREFIX="perf/"
          elif [[ "${{ contains(github.event.issue.labels.*.name, 'test') }}" == "true" ]]; then
            PREFIX="test/"
          else
            PREFIX=""
          fi

          echo "Prefix: $PREFIX"
          echo "Source: $SOURCE"

          echo "prefix=$PREFIX" >> $GITHUB_OUTPUT
          echo "source=$SOURCE" >> $GITHUB_OUTPUT

      - name: Sanitize Branch Name
        id: branch_name
        run: |
          TITLE="${{ steps.extract.outputs.title }}"
          # Convert to lowercase, trim whitespace, replace multiple spaces/special chars with single hyphen
          SANITIZED=$(echo "$TITLE" | \
            tr '[:upper:]' '[:lower:]' | \
            sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' | \
            sed -e 's/[^[:alnum:]]/-/g' | \
            sed -e 's/-\{2,\}/-/g' | \
            sed -e 's/^-//' -e 's/-$//')
          SANITIZED="$SANITIZED-issue-${{ github.event.issue.number}}"
          echo "Branch Name: $SANITIZED"
          echo "branch=$SANITIZED" >> $GITHUB_OUTPUT

      - name: Checkout Branch
        if: steps.prefix.outputs.prefix != ''
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.prefix.outputs.source }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git and Create Branch
        if: steps.prefix.outputs.prefix != ''
        run: |
          # Configure Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="${{ steps.prefix.outputs.prefix }}${{ steps.branch_name.outputs.branch }}"

          # Get the SHA of the source branch
          SOURCE_SHA=$(git rev-parse ${{ steps.prefix.outputs.source }})

          # Get Repository Node ID
          REPO_ID=$(gh api graphql -f query='
            query($owner:String!, $name:String!) {
              repository(owner:$owner, name:$name) {
                id
              }
            }' -f owner="${{ github.repository_owner }}" -f name="${{ github.event.repository.name }}" --jq '.data.repository.id')

          # Get Issue Node ID (converting issue number to integer)
          ISSUE_ID=$(gh api graphql -f query='
            query($owner:String!, $name:String!, $number:Int!) {
              repository(owner:$owner, name:$name) {
                issue(number:$number) {
                  id
                }
              }
            }' -f owner="${{ github.repository_owner }}" -f name="${{ github.event.repository.name }}" -F number=${{ github.event.issue.number }} --jq '.data.repository.issue.id')

          # Create branch using GraphQL API to properly link it to the issue
          gh api graphql -f query='
            mutation ($repositoryId: ID!, $issueId: ID!, $name: String!, $oid: GitObjectID!) {
              createLinkedBranch(input: {repositoryId: $repositoryId, issueId: $issueId, name: $name, oid: $oid}) {
                linkedBranch {
                  id
                }
              }
            }' \
            -f repositoryId="$REPO_ID" \
            -f issueId="$ISSUE_ID" \
            -f name="$BRANCH_NAME" \
            -f oid="$SOURCE_SHA"

          # Fetch the new branch
          git fetch origin "$BRANCH_NAME"
          git checkout "$BRANCH_NAME"

          # Create comment on issue linking the branch
          gh issue comment "${{ github.event.issue.number }}" --body "Created branch [\`$BRANCH_NAME\`](https://github.com/${{ github.repository }}/tree/$BRANCH_NAME) from \`${{ steps.prefix.outputs.source }}\` for this issue."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
