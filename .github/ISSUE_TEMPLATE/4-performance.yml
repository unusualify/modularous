name: "⚡ Performance Issue"
description: Create a new ticket for a performance issue or optimization request
title: "⚡ [PERF]: "
labels: [
  "performance"
]
body:
  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: Please describe the performance issue in detail
      placeholder: Explain what performance problem you're experiencing...
    validations:
      required: true
  - type: dropdown
    id: affected_version
    attributes:
      label: "Affected version line"
      description: >
        Which maintained branch line does this affect (matches repo branches like 0.x, 11.x)?
        GitHub issue forms cannot load tags/releases automatically; options are updated manually when support lines change.
      options:
        - "0.x"
        - "10.x"
        - "11.x"
    validations:
      required: true
  - type: textarea
    id: current_behavior
    attributes:
      label: "Current Performance"
      description: Describe the current performance metrics or behavior
      placeholder: e.g., Page takes 5 seconds to load, API response time is 3 seconds
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: "Expected Performance"
      description: Describe what performance level you expect or need
      placeholder: e.g., Page should load within 2 seconds, API should respond within 500ms
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: "Steps to Reproduce"
      description: Please provide steps to reproduce the performance issue
      value: |
        1. Go to '...'
        2. Click on '....'
        3. Observe performance issue
    validations:
      required: true
  - type: textarea
    id: metrics
    attributes:
      label: "Performance Metrics"
      description: If available, provide any performance metrics, profiling data, or benchmarks
      render: bash
    validations:
      required: false
  - type: textarea
    id: screenshot
    attributes:
      label: "Screenshots/Recordings"
      description: If applicable, add screenshots or recordings showing the performance issue
      value: |
        ![DESCRIPTION](LINK.png)
    validations:
      required: false
